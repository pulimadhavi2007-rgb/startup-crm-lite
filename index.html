<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <script>
      (() => {
        try {
          const isDark = JSON.parse(
            localStorage.getItem("startup-crm-theme")
          );

          if (isDark) {
            document.documentElement.classList.add("dark");
          }
        } catch (error) {
          console.error(error);
        }
      })();
    </script>

    <title>Startup CRM Lite</title>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
